name: Android CI

on:
  push: 
    branches: [ "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    # - name: set up JDK 11
    #   uses: actions/setup-java@v4
    #   with:
    #     java-version: '11'
    #     distribution: 'temurin'
    #     cache: gradle

    - name: Grant permission
      run: chmod +x gradlew
      
    - name: Build 
      run: ./gradlew build

    - name: Run tests
      run: ./gradlew test
